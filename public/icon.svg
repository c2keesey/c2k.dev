<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="512" height="256" rx="108" fill="url(#shine)"/>
  <!-- c2k mark -->
  <text x="256" y="280" dominant-baseline="central" text-anchor="middle" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-weight="800" font-size="200" fill="rgba(255,255,255,0.95)" letter-spacing="-8">c2k</text>
</svg>
